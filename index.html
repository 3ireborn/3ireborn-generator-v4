<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generator Istikmal Syariah V5</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#061b18;
    color:white;
    padding:20px;
}

.box{
    max-width:650px;
    margin:auto;
}

h1{
    text-align:center;
    color:#d4af37;
}

input, textarea, button{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button{
    background:#d4af37;
    font-weight:bold;
    cursor:pointer;
}

.upload-btn{
    background:#00cc99;
    color:white;
    margin-bottom:15px;
}

.result{
    background:#102d28;
    padding:20px;
    border-radius:12px;
    margin-top:25px;
    word-wrap:break-word;
}

.link{
    color:#00ffcc;
    background:#0a1f1b;
    padding:12px;
    border-radius:8px;
    display:block;
    margin:10px 0;
    font-size:15px;
}

.preview{
    max-width:100%;
    max-height:200px;
    margin:10px 0;
    border-radius:10px;
    border:2px solid #d4af37;
}
</style>
</head>

<body>

<div class="box">
    <h1>ISTIKMAL SYARIAH<br>GENERATOR V5</h1>

    <label>Nama Leader</label>
    <input id="nama" placeholder="Contoh: Sugiarto Kurniawan">

    <label>No WhatsApp</label>
    <input id="wa" placeholder="6282240001731">

    <label>Slug Branding</label>
    <input id="slug" placeholder="NganggurAjaBisa">

    <label>Upload Foto Leader</label>
    <input type="file" id="fotoUpload" accept="image/*" style="display:none;">
    <button class="upload-btn" onclick="document.getElementById('fotoUpload').click()">
        📸 Upload Foto Leader
    </button>
    
    <img id="preview" class="preview" style="display:none;">
    <input id="foto" placeholder="Link foto akan muncul otomatis" readonly>

    <button onclick="generate()" style="margin-top:20px;">
        🚀 GENERATE LINK
    </button>

    <div class="result">
        <h3>LP MASTER</h3>
        <p id="master" class="link"></p>
        <button onclick="copy('master')">Copy LP Master</button>

        <h3>LP HOT</h3>
        <p id="hot" class="link"></p>
        <button onclick="copy('hot')">Copy LP Hot</button>

        <h3>FORM PENDAFTARAN</h3>
        <p id="form" class="link"></p>
        <button onclick="copy('form')">Copy Form</button>
    </div>
</div>

<script>
// Upload foto ke Imgbb
async function uploadToImgbb(file) {
    const formData = new FormData();
    formData.append('image', file);

    try {
        const res = await fetch('https://api.imgbb.com/1/upload?key=1c8e4d7e0e0e0e0e0e0e0e0e0e0e0e0e', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        
        if (data.status === 200) {
            return data.data.url;
        } else {
            alert("Gagal upload foto");
            return null;
        }
    } catch (e) {
        alert("Error upload: " + e.message);
        return null;
    }
}

document.getElementById('fotoUpload').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    // Preview
    const preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';

    // Upload
    const link = await uploadToImgbb(file);
    if (link) {
        document.getElementById('foto').value = link;
    }
});

function generate(){
    let nama = document.getElementById("nama").value.trim();
    let wa = document.getElementById("wa").value.trim();
    let slug = document.getElementById("slug").value.trim();
    let foto = document.getElementById("foto").value.trim();

    if (!nama || !wa || !slug || !foto) {
        alert("Mohon isi semua field dan upload foto!");
        return;
    }

    let param = "?name="+encodeURIComponent(nama)+
                "&wa="+wa+
                "&slug="+encodeURIComponent(slug)+
                "&foto="+encodeURIComponent(foto);

    let domain = "https://3ireborn.github.io/3ireborn-generator-v4/";

    document.getElementById("master").innerText = domain + "lp-master-v4.html" + param;
    document.getElementById("hot").innerText = domain + "lp-hot-v4.html" + param;
    document.getElementById("form").innerText = domain + "form-pendaftaran-v4.html" + param;
}

function copy(id){
    let text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("✅ Link berhasil dicopy!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generator Istikmal Syariah V6 - Super Simpel</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#061b18;
    color:white;
    padding:20px;
}

.box{max-width:650px; margin:auto;}
h1{text-align:center; color:#d4af37; margin-bottom:30px;}

input, button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:none;
    font-size:16px;
}

button{
    font-weight:bold;
    cursor:pointer;
    font-size:17px;
}

.upload-btn{background:#00cc99; color:white;}
.generate-btn{background:#d4af37; color:#061b18; padding:18px;}

.result{
    background:#102d28;
    padding:20px;
    border-radius:12px;
    margin-top:25px;
}

.link{
    color:#00ffcc;
    background:#0a1f1b;
    padding:14px;
    border-radius:8px;
    word-break:break-all;
    font-size:15px;
    margin:12px 0;
}
</style>
</head>

<body>

<div class="box">
    <h1>ISTIKMAL SYARIAH<br><span style="font-size:22px;">GENERATOR SUPER SIMPEL V6</span></h1>

    <label>Nama Leader</label>
    <input id="nama" placeholder="Nama Lengkap">

    <label>No WhatsApp</label>
    <input id="wa" placeholder="628xxxxxxxxxx">

    <label>Slug Branding</label>
    <input id="slug" placeholder="NamaBrandAnda">

    <label>Link Foto Leader</label>
    <button class="upload-btn" onclick="openUpload()">📸 Upload Foto Sekarang</button>
    <input id="foto" placeholder="Paste link foto di sini" style="margin-top:8px;">

    <button class="generate-btn" onclick="generate()">
        🚀 GENERATE SEMUA LINK
    </button>

    <div class="result">
        <h3>🔗 LP MASTER</h3>
        <p id="master" class="link"></p>
        <button onclick="copy('master')">📋 Copy LP Master</button>

        <h3>🔥 LP HOT</h3>
        <p id="hot" class="link"></p>
        <button onclick="copy('hot')">📋 Copy LP Hot</button>

        <h3>📝 FORM PENDAFTARAN</h3>
        <p id="form" class="link"></p>
        <button onclick="copy('form')">📋 Copy Form</button>
    </div>
</div>

<script>
function openUpload() {
    alert("1. Buka link ini\n2. Upload foto\n3. Copy 'Direct Link'\n4. Paste di kolom atas");
    window.open('https://postimages.org/', '_blank');
}

function generate(){
    const nama = document.getElementById("nama").value.trim();
    const wa = document.getElementById("wa").value.trim();
    const slug = document.getElementById("slug").value.trim();
    const foto = document.getElementById("foto").value.trim();

    if (!nama || !wa || !slug || !foto) {
        alert("❌ Harap isi semua kolom ya!");
        return;
    }

    const param = `?name=${encodeURIComponent(nama)}&wa=${wa}&slug=${encodeURIComponent(slug)}&foto=${encodeURIComponent(foto)}`;
    const domain = "https://3ireborn.github.io/3ireborn-generator-v4/";

    document.getElementById("master").innerText = domain + "lp-master-v4.html" + param;
    document.getElementById("hot").innerText   = domain + "lp-hot-v4.html" + param;
    document.getElementById("form").innerText  = domain + "form-pendaftaran-v4.html" + param;
}

function copy(id){
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("✅ Link berhasil dicopy!");
}
</script>

</body>
</html>

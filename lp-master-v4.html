<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Istikmal Syariah</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#062018;
    color:white;
    text-align:center;
}

.hero{
    padding:40px 20px;
}

h1{
    color:#d4af37;
    font-size:34px;
}

.card{
    background:#10352c;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.photo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #d4af37;
    margin:20px auto;
    display:block;
}

button{
    background:#d4af37;
    border:0;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    font-size:17px;
    width:90%;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="hero">

<h1>ISTIKMAL SYARIAH</h1>
  
<img id="fotoLeader" class="photo" src="" alt="Leader">
  
<h2>
Bisnis Berkah<br>
Mengantarkan Sampai Ke Mekah
</h2>

<div class="card">

<p>
Mulai rencanakan Umroh dengan cara sederhana.<br>
Sisihkan bukan sisakan.
</p>

<h3 id="leader"></h3>

<button onclick="wa()">
Konsultasi Sekarang
</button>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const nama = params.get("name") || "Leader";
const nomor = params.get("wa") || "";
const foto = params.get("foto") || "";
const jabatan = params.get("jabatan") || "Konsultan Istikmal Syariah";

document.getElementById("fotoLeader").src = foto;

// Tampilan Nama + Jabatan
document.getElementById("leader").innerHTML = `
    Dibimbing oleh:<br>
    <strong>${nama}</strong><br>
    ${jabatan}
`;

function wa(){
    let pesan = `Halo ${nama}, saya ingin info Istikmal Syariah`;
    location.href = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
}
</script>

</body>
</html>
